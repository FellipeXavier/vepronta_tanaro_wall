<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VePronta AR - Tanaro</title>

    <script src="https://cdn.aframe.io/1.4.1/aframe.min.js"></script>
    
    <script src="xr.js"></script>

    <script>
      // Componente para avisar no console quando o móvel carregar
      AFRAME.registerComponent('rastreador-vepronta', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            console.log("Modelo Tanaro (170m-210m) carregado com sucesso!");
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      xrweb="allowedDevices: any; worldTracking: true; preloadChunks: slam"
      xrextras-gesture-detector
      xrextras-almost-there
      xrextras-loading
      xrextras-runtime-error>

      <a-assets>
        <a-asset-item id="modelo-tanaro" src="assets/tanaro.glb"></a-asset-item>
        
        <img id="marcador-augin" src="assets/augin.jpg">
      </a-assets>

      <a-entity camera position="0 8 8" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-entity>

      <a-entity xrextras-named-image-target="name: assets/augin.jpg">
        <a-entity 
          gltf-model="#modelo-tanaro" 
          scale="1 1 1" 
          position="0 0 0"
          rastreador-vepronta>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
