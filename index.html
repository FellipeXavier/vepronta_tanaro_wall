<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VePronta AR - Alta Fidelidade</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      // SCRIPT DE ENGENHARIA: Trava o objeto no mundo real
      AFRAME.registerComponent('trava-persistente', {
        init: function () {
          var marker = this.el.parentNode;
          var model = this.el;
          var scene = document.querySelector('a-scene');
          var fixado = false;

          marker.addEventListener('markerFound', function () {
            if (!fixado) {
              // Quando acha o papel, ele "desgruda" do papel e fixa no mundo
              let worldPos = new THREE.Vector3();
              let worldQuat = new THREE.Quaternion();
              let worldScale = new THREE.Vector3();
              
              model.object3D.getWorldPosition(worldPos);
              model.object3D.getWorldQuaternion(worldQuat);
              model.object3D.getWorldScale(worldScale);

              // Move o modelo para a cena global (fora do marcador)
              scene.appendChild(model);
              model.object3D.position.copy(worldPos);
              model.object3D.quaternion.copy(worldQuat);
              model.object3D.scale.copy(worldScale);
              
              fixado = true;
              console.log("Móvel ancorado com sucesso no espaço real!");
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10;">
      
      <a-assets>
        <a-asset-item id="modelo-tanaro" src="assets/tanaro.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity 
          id="casa-vepronta"
          gltf-model="#modelo-tanaro" 
          scale="5 5 5" 
          position="0 0 0"
          rotation="-90 0 0"
          trava-persistente>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
