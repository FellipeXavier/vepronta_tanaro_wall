<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VePronta AR - Profundidade Real</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

      <a-assets>
        <a-asset-item id="modelo-tanaro" src="assets/tanaro.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro" id="gatilho">
        <a-entity id="guia" visible="false"></a-entity>
      </a-marker>

      <a-entity id="casa-final" gltf-model="#modelo-tanaro" scale="15 15 15" visible="false"></a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marcador = document.querySelector('#gatilho');
      const casaFinal = document.querySelector('#casa-final');

      marcador.addEventListener('markerFound', () => {
        if (casaFinal.getAttribute('visible') === false) {
          // 1. Pegamos a posição do marcador no espaço 3D (Mundo)
          const position = new THREE.Vector3();
          const quaternion = new THREE.Quaternion();
          const scale = new THREE.Vector3();

          marcador.object3D.getWorldPosition(position);
          marcador.object3D.getWorldQuaternion(quaternion);
          marcador.object3D.getWorldScale(scale);

          // 2. Aplicamos essa posição na casa que está SOLTA na cena
          casaFinal.object3D.position.copy(position);
          casaFinal.object3D.quaternion.copy(quaternion);
          
          // 3. Ajuste de rotação para ela não ficar de pé (Eixo X)
          casaFinal.object3D.rotateX(-Math.PI / 2);

          casaFinal.setAttribute('visible', 'true');
          console.log("Imóvel concretado no chão da obra!");
        }
      });
    </script>
  </body>
</html>
