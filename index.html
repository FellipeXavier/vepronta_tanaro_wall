<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VePronta AR - Persistência Real</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 15;">

      <a-assets>
        <a-asset-item id="modelo-tanaro" src="assets/tanaro.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro" id="gatilho">
        <a-entity 
          id="casa-original"
          gltf-model="#modelo-tanaro" 
          scale="10 10 10" 
          position="0 0 0" 
          rotation="-90 0 0">
        </a-entity>
      </a-marker>

      <a-entity id="casa-fixa" visible="false"></a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marcador = document.querySelector('#gatilho');
      const casaOriginal = document.querySelector('#casa-original');
      const casaFixa = document.querySelector('#casa-fixa');

      marcador.addEventListener('markerFound', () => {
        if (casaFixa.getAttribute('visible') === false) {
          // 1. Pegamos a posição exata de onde o Hiro está no chão da obra
          const position = new THREE.Vector3();
          const rotation = new THREE.Quaternion();
          const scale = new THREE.Vector3();
          
          casaOriginal.object3D.getWorldPosition(position);
          casaOriginal.object3D.getWorldQuaternion(rotation);
          casaOriginal.object3D.getWorldScale(scale);

          // 2. Clonamos o modelo para fora do marcador (na cena principal)
          casaFixa.setAttribute('gltf-model', '#modelo-tanaro');
          casaFixa.setAttribute('scale', '10 10 10'); // Ajuste conforme a obra
          casaFixa.object3D.position.copy(position);
          casaFixa.object3D.quaternion.copy(rotation);
          
          // 3. Tornamos a casa fixa visível e escondemos a do marcador
          casaFixa.setAttribute('visible', 'true');
          casaOriginal.setAttribute('visible', 'false');
          
          console.log("Ancoragem concluída! Pode caminhar pela obra.");
        }
      });
    </script>
  </body>
</html>
