<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VePronta AR - Estabilidade Total</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; smooth: true; smoothCount: 10; smoothTolerance: 0.01; smoothThreshold: 5;">

      <a-assets>
        <a-asset-item id="modelo-tanaro" src="assets/tanaro.glb"></a-asset-item>
      </a-assets>

      <a-marker id="marcador-obra" preset="hiro">
        
        <a-entity 
          id="modelo-entidade"
          gltf-model="#modelo-tanaro" 
          scale="10 10 10" 
          position="0 0 0" 
          rotation="-90 0 0">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Função para impedir o objeto de sumir
      const marker = document.querySelector('#marcador-obra');
      const entity = document.querySelector('#modelo-entidade');

      marker.addEventListener('markerLost', function() {
        // Quando o papel some, nós forçamos a visibilidade a continuar ligada
        entity.setAttribute('visible', true);
        console.log("Mantendo o imóvel visível na obra...");
      });
    </script>
  </body>
</html>
