<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VePronta AR - Persistente</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

      <a-assets>
        <a-asset-item id="modelo-tanaro" src="assets/tanaro.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro"> <a-entity 
          gltf-model="#modelo-tanaro" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="-90 0 0">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Script para "travar" o objeto no mundo real assim que ele aparece pela primeira vez
      window.addEventListener('markerFound', function () {
        console.log("Ancoragem confirmada! Agora você pode se afastar do papel.");
      });
    </script>
  </body>
</html>
